# ═══════════════════════════════════════════════════════════════
# NSMoR — Default Experiment Configuration
# ═══════════════════════════════════════════════════════════════
#
# Usage:
#   python train.py --config config/default.yaml
#   python train.py --config config/default.yaml --lr 5e-4 --freeze lif_cell router
#
# All keys are optional; missing values fall back to dataclass defaults.
# See nsmor/config_parser.py for the full schema.

# ── Model architecture ──────────────────────────────────────
model:
  sensory_dim: 4          # visual angle, wind, velocity, acceleration
  mcmc_dim: 4             # MCMC prior probability vector
  hidden_dim: 64          # shared hidden dimension for LIF + GRU
  num_gru_layers: 1       # stacked GRU layers
  dropout: 0.1            # dropout in GRU and decoder
  lif_alpha: 0.9          # LIF leak factor (higher = slower decay)
  lif_threshold: 0.5      # LIF spike threshold
  lif_beta: 2.0           # LIF input scaling

  # CF8 fix: TBPTT prevents gradient collapse along recurrence.
  # CF9: Tightened to 32 for stability with new biophysical dynamics.
  lif_tbptt_steps: 32    # truncated BPTT window (0=full BPTT, risky for long seqs)

  # CF9: Enable biophysical mechanisms ─────────────────────────
  # Synaptic delay (Destexhe et al. 1994): IIR low-pass filter on
  # input current.  tau_syn=5ms at dt≈1ms → alpha_syn ≈ 0.82.
  # Smooths sharp input transients, prevents membrane voltage spikes.
  lif_tau_syn: 5.0         # synaptic time constant (ms); 0 = disabled

  # Spike-frequency adaptation (Brette & Gerstner 2005, AdEx):
  # Slow adaptation current w accumulates on spike, decays between.
  # tau_w=100ms → neurons reduce firing during sustained input.
  # b_adapt=0.5 → per-spike adaptation increment.
  lif_tau_w: 100.0         # adaptation time constant (ms); 0 = disabled
  lif_b_adapt: 0.5         # per-spike adaptation increment

  # Lateral inhibition (Ritzmann & Camhi 1978): subtracts weighted
  # population spike history from membrane potential.
  # Strength 0.1 — moderate inhibition, sharpens population response.
  lif_lateral_inhibition: 0.1  # inhibition strength; 0 = disabled

  # Stochastic resonance (Douglass et al. 1993): small Gaussian
  # noise injected during training improves subthreshold signal detection.
  sensory_noise_std: 0.01  # noise std; 0 = disabled

# ── Training hyperparameters ────────────────────────────────
training:
  learning_rate: 0.0005
  weight_decay: 0.0001
  num_epochs: 150
  batch_size: 32
  grad_clip_norm: 1.0
  log_interval: 10
  checkpoint_interval: 10
  random_seed: 42
  max_seq_len: 1000        # crop sequences longer than this (cuDNN compatibility)

# ── Loss function ───────────────────────────────────────────
loss:
  reduction: mean           # MSE reduction: 'mean' or 'sum'
  target_rate: 0.05         # target mean firing rate for sparsity L1
  lambda_energy: 0.001        # ATP metabolic cost (0 disables)
  lambda_sparse: 0.005        # population sparsity L1 (0 disables)
  lambda_jerk: 0.005         # temporal coherence / jerk penalty (0 disables)
  jerk_threshold: 0.1       # sudden-change jerk mask threshold
  warmup_epochs: 20          # CF9: extended warmup for new biophysical mechanisms

# ── Dataset paths ───────────────────────────────────────────
# Each field is a list of CSV paths; multiple files are concatenated.
data:
  train_kinematics:
    - data/session_0/kinematics.csv
    - data/session_1/kinematics.csv
  train_events:
    - data/session_0/events.csv
    - data/session_1/events.csv
  val_kinematics:
    - data/val/kinematics.csv
  val_events:
    - data/val/events.csv
  test_kinematics: []
  test_events: []

# ── Fine-tuning strategy ────────────────────────────────────
# freeze_modules: list of sub-module names to freeze.
# Valid: sensory_encoder, lif_cell, gru_unit, router, direction_head
# unfreeze_after_epoch: set >= 0 to unfreeze all at that epoch.
finetune:
  freeze_modules: []
  unfreeze_after_epoch: 10

# ── Checkpoint / output ─────────────────────────────────────
checkpoint:
  output_dir: runs/default
  resume_from: null        # path to .pt checkpoint to resume from
